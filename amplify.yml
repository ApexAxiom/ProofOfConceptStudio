version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - echo "node-linker=hoisted" > .npmrc
            - pnpm install --frozen-lockfile
            - node scripts/write-amplify-web-env.mjs
        build:
          commands:
            - pnpm --filter @proof/shared build
            - pnpm --filter @proof/web build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - .pnpm-store/**/*
          - node_modules/**/*
          - apps/web/.next/cache/**/*
