name: CI: build packages and apps (App Runner simulation)

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  apprunner-sim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared package
        run: pnpm --filter @proof/shared... build

      - name: Build web app
        run: pnpm --filter @proof/web... build

      - name: Build api app
        run: pnpm --filter @proof/api... build

      - name: Build runner app
        run: pnpm --filter @proof/runner... build

      # Deterministic smoke suites only — no network or AWS credentials needed.
      - name: Smoke tests (runner)
        run: |
          pnpm --filter @proof/runner run validate:smoke
          pnpm --filter @proof/runner run evidence:smoke
          pnpm --filter @proof/runner run usefulness:smoke
          pnpm --filter @proof/runner run ingest:smoke
          pnpm --filter @proof/runner run brief-v2:validate:smoke
          pnpm --filter @proof/runner run procurement-report:smoke
          pnpm --filter @proof/runner run brief-engine-v3:smoke
          pnpm --filter @proof/runner run render:smoke
          pnpm --filter @proof/runner run fallback:smoke

      - name: Smoke tests (api + web)
        run: |
          pnpm --filter @proof/api run latest-selection:smoke
          pnpm --filter @proof/web run brief-detail:smoke
