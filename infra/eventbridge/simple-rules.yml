AWSTemplateFormatVersion: '2010-09-09'
Description: Legacy EventBridge Rules for brief runs - disabled; use Scheduler templates for Tuesday/Thursday local time

Parameters:
  RunnerBaseUrl:
    Type: String
    Description: Base URL of the runner service
  CronSecret:
    Type: String
    Description: CRON_SECRET value
    NoEcho: true

Resources:
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole

  APACRule:
    Type: AWS::Events::Rule
    Properties:
      Name: briefs-apac-legacy-disabled
      Description: Disabled legacy APAC rule; use EventBridge Scheduler at 6:00 AM Australia/Perth on Tuesday/Thursday
      ScheduleExpression: cron(0 22 ? * MON,WED *)
      State: DISABLED
      Targets:
        - Id: APACTarget
          Arn: !Sub "${RunnerBaseUrl}/cron"
          HttpParameters:
            HeaderParameters:
              Authorization: !Sub "Bearer ${CronSecret}"
              Content-Type: application/json
          Input: '{"runWindow":"apac","regions":["au"],"scheduled":true}'
          RoleArn: !GetAtt EventBridgeRole.Arn

  InternationalRule1:
    Type: AWS::Events::Rule
    Properties:
      Name: briefs-international-legacy-11utc-disabled
      Description: Disabled legacy international rule; use EventBridge Scheduler at 5:00 AM America/Chicago on Tuesday/Thursday
      ScheduleExpression: cron(0 11 ? * TUE,THU *)
      State: DISABLED
      Targets:
        - Id: International11Target
          Arn: !Sub "${RunnerBaseUrl}/cron"
          HttpParameters:
            HeaderParameters:
              Authorization: !Sub "Bearer ${CronSecret}"
              Content-Type: application/json
          Input: '{"runWindow":"international","regions":["us-mx-la-lng"],"scheduled":true}'
          RoleArn: !GetAtt EventBridgeRole.Arn

  InternationalRule2:
    Type: AWS::Events::Rule
    Properties:
      Name: briefs-international-legacy-12utc-disabled
      Description: Disabled legacy international rule; use EventBridge Scheduler at 5:00 AM America/Chicago on Tuesday/Thursday
      ScheduleExpression: cron(0 12 ? * TUE,THU *)
      State: DISABLED
      Targets:
        - Id: International12Target
          Arn: !Sub "${RunnerBaseUrl}/cron"
          HttpParameters:
            HeaderParameters:
              Authorization: !Sub "Bearer ${CronSecret}"
              Content-Type: application/json
          Input: '{"runWindow":"international","regions":["us-mx-la-lng"],"scheduled":true}'
          RoleArn: !GetAtt EventBridgeRole.Arn
